server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.veles-voyage.ru;
    ssl_certificate /etc/letsencrypt/live/veles-voyage.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/veles-voyage.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # AI bots: serve compact JSON-LD or Markdown instead of full HTML
    location / {
        if ($http_accept ~* "application/ld\+json|application/llm\+json|text/markdown|application/x-markdown") {
            rewrite ^/(.*)$ /api/ai-content/$1 last;
        }

        if ($http_user_agent ~* "GPTBot|ChatGPT-User|ClaudeBot|Claude-User|Claude-SearchBot|Claude-Web|Google-Extended|PerplexityBot|Perplexity-User|OAI-SearchBot|Amazonbot|FacebookBot|Applebot|Applebot-Extended|cohere-ai|anthropic-ai|Bytespider|Yandex-Neuro") {
            rewrite ^/(.*)$ /api/ai-content/$1 last;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
